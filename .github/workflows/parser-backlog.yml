name: Parser (backlog)

on:
  workflow_dispatch:

concurrency:
  group: parser-backlog
  cancel-in-progress: false

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Apply DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: worker
        run: python apply_migrations.py

      - name: Run catalog parser (backlog)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PARSER_MODE: backlog
          PARSER_MAX_PARSED_QUEUE: "120"
          PIPELINE_PROFILE: hyper
          HIDEN_FETCH_PROXY: https://peach-cron.jojetoce199.workers.dev/fetch
          PARSER_FETCH_SECRET: ${{ secrets.PEACH_CRON_SECRET }}
        working-directory: worker
        run: python run_catalog_parser.py
