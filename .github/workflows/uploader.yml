name: Uploader

on:
  workflow_dispatch:

concurrency:
  group: uploader
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Apply DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: worker
        run: python apply_migrations.py

      - name: Recover and reset catalog
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: worker
        run: python cleanup_catalog.py

      - name: Run upload worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
          PIPELINE_PROFILE: turbo
          UPLOADER_MAX_PER_RUN: "2"
          NAMEVIDS_DAILY_CAP: "200"
          UPLOADER_NAMEVIDS_ONLY: "1"
          UPLOADER_GAP_SEC: "30"
          HIDEN_FETCH_PROXY: https://peach-cron.jojetoce199.workers.dev/fetch
          PARSER_FETCH_SECRET: ${{ secrets.PEACH_CRON_SECRET }}
        working-directory: worker
        run: python run_uploader.py
